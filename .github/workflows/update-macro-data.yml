name: 更新宏观数据

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'fetch_macro_data.py'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
      
      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install requests pandas
      
      - name: 运行数据采集脚本
        run: python fetch_macro_data.py
      
      - name: 查看生成的文件
        run: |
          echo "当前目录文件列表:"
          ls -la
          echo "macro_score.csv 最后5行:"
          tail -5 macro_score.csv || echo "文件不存在"
      
      - name: 提交更新
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_score.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新宏观数据 [skip ci]" && git push)
